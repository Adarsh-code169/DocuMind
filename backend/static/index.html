<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intelligent Research Assistant</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- React & Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f0fdf4; }
        .sidebar-gradient { background: linear-gradient(180deg, #0b0f0c 0%, #022c22 100%); }
        .chat-container::-webkit-scrollbar { width: 6px; }
        .chat-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .transition-all { transition: all 0.2s ease-in-out; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(8px); }
        @keyframes pulse-green {
            0%, 100% { border-color: #22c55e; box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            50% { border-color: #4ade80; box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.1); }
        }
        .focus-ring:focus { outline: none; animation: pulse-green 2s infinite; }
    </style>
</head>
<body class="h-screen overflow-hidden">
    <div id="root" class="h-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SidebarItem = ({ icon: Icon, label, active = false }) => (
            <button className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all ${active ? 'bg-[#14532d] text-white shadow-lg' : 'text-gray-400 hover:bg-[#022c22] hover:text-white'}`}>
                <i data-lucide={Icon} className="w-4 h-4"></i>
                <span className="text-sm font-medium">{label}</span>
            </button>
        );

        const App = () => {
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [pipelineStatus, setPipelineStatus] = useState(null);
            const [isUploading, setIsUploading] = useState(false);
            const chatEndRef = useRef(null);
            const fileInputRef = useRef(null);

            useEffect(() => {
                lucide.createIcons();
                setMessages([{
                    role: 'assistant',
                    content: "Hello! I'm your Intelligent Research Assistant. Upload a PDF and ask me anything about it."
                }]);
            }, []);

            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
                lucide.createIcons();
            }, [messages]);

            const handleUpload = async (e) => {
                const files = e.target.files;
                if (!files.length) return;

                setIsUploading(true);
                setPipelineStatus("Initializing Upload...");

                const formData = new FormData();
                formData.append('file', files[0]);

                try {
                    const response = await fetch('/upload', { method: 'POST', body: formData });
                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        const chunk = decoder.decode(value);
                        const lines = chunk.split('\n');
                        for (const line of lines) {
                            if (line.trim()) {
                                const data = JSON.parse(line);
                                if (data.status) setPipelineStatus(data.status);
                                if (data.error) alert(data.error);
                            }
                        }
                    }
                    setTimeout(() => setPipelineStatus(null), 3000);
                } catch (err) {
                    setPipelineStatus("Upload failed.");
                    console.error(err);
                } finally {
                    setIsUploading(false);
                    e.target.value = '';
                }
            };

            const handleSend = async () => {
                if (!input.trim()) return;

                const userMsg = input;
                setInput('');
                setMessages(prev => [...prev, { role: 'user', content: userMsg }]);
                setPipelineStatus("Processing query...");

                try {
                    const response = await fetch('/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: userMsg })
                    });

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    let finalAnswer = '';

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        const chunk = decoder.decode(value);
                        const lines = chunk.split('\n');
                        for (const line of lines) {
                            if (line.trim()) {
                                const data = JSON.parse(line);
                                if (data.status) setPipelineStatus(data.status);
                                if (data.answer) {
                                    finalAnswer = data.answer;
                                    setMessages(prev => [...prev, { role: 'assistant', content: data.answer, citations: data.citations }]);
                                }
                            }
                        }
                    }
                    setPipelineStatus(null);
                } catch (err) {
                    setPipelineStatus("Error generating response.");
                    console.error(err);
                }
            };

            return (
                <div className="flex h-screen w-screen bg-[#f0fdf4]">
                    {/* Sidebar */}
                    <aside className="w-64 sidebar-gradient flex flex-col p-4 shadow-2xl">
                        <div className="flex items-center gap-2 mb-8 px-2 text-white">
                            <div className="w-8 h-8 bg-[#22c55e] rounded-lg flex items-center justify-center">
                                <i data-lucide="book-open" className="w-5 h-5 text-black"></i>
                            </div>
                            <span className="font-bold text-lg tracking-tight">Endee RAG</span>
                        </div>

                        <nav className="flex-1 space-y-2 overflow-y-auto">
                            <SidebarItem icon="plus" label="New Chat" active />
                            <SidebarItem icon="search" label="Search Chats" />
                            <SidebarItem icon="image" label="Images" />
                            <SidebarItem icon="grid" label="Apps" />
                            <SidebarItem icon="rocket" label="Deep Research" />
                            <SidebarItem icon="terminal" label="Codex" />
                            <SidebarItem icon="zap" label="GPTs" />
                            <SidebarItem icon="folder" label="Projects" />

                            <div className="pt-6 pb-2 text-[10px] font-bold text-gray-500 uppercase tracking-widest px-3">Recents</div>
                            <div className="space-y-1">
                                <button className="w-full text-left px-3 py-2 text-xs text-gray-400 hover:text-white truncate transition-all">Research Paper Analysis</button>
                                <button className="w-full text-left px-3 py-2 text-xs text-gray-400 hover:text-white truncate transition-all">Market Trends Q4</button>
                            </div>
                        </nav>

                        <div className="mt-auto pt-4 border-t border-gray-800">
                            <div className="flex items-center gap-3 px-2 py-3 hover:bg-[#022c22] rounded-xl transition-all cursor-pointer">
                                <div className="w-8 h-8 rounded-full bg-[#14532d] flex items-center justify-center text-xs font-bold text-green-400">AS</div>
                                <div className="flex flex-col">
                                    <span className="text-sm text-white font-medium">Adarsh Shukla</span>
                                    <span className="text-[10px] text-gray-500">Free Plan</span>
                                </div>
                            </div>
                        </div>
                    </aside>

                    {/* Main Chat Area */}
                    <main className="flex-1 flex flex-col relative">
                        {/* Header */}
                        <header className="h-16 flex items-center justify-between px-8 bg-white/50 backdrop-blur-md border-b border-green-100">
                            <h2 className="text-lg font-semibold text-gray-800">Intelligent Research Assistant</h2>
                            <div className="flex gap-4">
                                <button className="p-2 text-gray-500 hover:text-green-600 transition-all"><i data-lucide="share" className="w-5 h-5"></i></button>
                                <button className="p-2 text-gray-500 hover:text-green-600 transition-all"><i data-lucide="settings" className="w-5 h-5"></i></button>
                            </div>
                        </header>

                        {/* Messages */}
                        <div className="flex-1 overflow-y-auto chat-container p-8 space-y-6">
                            <div className="max-w-3xl mx-auto w-full space-y-8">
                                {messages.map((msg, i) => (
                                    <div key={i} className={`flex gap-4 ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                        {msg.role === 'assistant' && (
                                            <div className="w-8 h-8 rounded-lg bg-[#22c55e]/20 flex items-center justify-center flex-shrink-0">
                                                <i data-lucide="bot" className="w-5 h-5 text-[#22c55e]"></i>
                                            </div>
                                        )}
                                        <div className={`max-w-[85%] px-4 py-3 rounded-2xl ${
                                            msg.role === 'user' 
                                            ? 'bg-[#14532d] text-white shadow-md' 
                                            : 'bg-white border border-green-100 text-gray-800 shadow-sm'
                                        }`}>
                                            <div className="text-sm leading-relaxed whitespace-pre-wrap">{msg.content}</div>
                                            {msg.citations && msg.citations.length > 0 && (
                                                <div className="mt-4 pt-3 border-t border-green-50 flex flex-wrap gap-2">
                                                    {msg.citations.map((cite, idx) => (
                                                        <span key={idx} className="bg-green-50 text-[10px] px-2 py-1 rounded-md text-green-700 font-medium border border-green-200">
                                                            {cite.filename} (p. {cite.page_number})
                                                        </span>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                ))}
                                <div ref={chatEndRef} />
                            </div>
                        </div>

                        {/* Input Area */}
                        <div className="p-6 bg-transparent">
                            <div className="max-w-3xl mx-auto relative">
                                {/* Pipeline Status Bar */}
                                {pipelineStatus && (
                                    <div className="absolute -top-10 left-0 right-0 flex justify-center">
                                        <div className="bg-[#14532d] text-white px-4 py-1.5 rounded-full text-xs font-medium flex items-center gap-2 shadow-lg animate-bounce">
                                            <i data-lucide="refresh-cw" className="w-3 h-3 animate-spin"></i>
                                            {pipelineStatus}
                                        </div>
                                    </div>
                                )}

                                <div className="glass border-2 border-green-100 rounded-3xl p-2 shadow-2xl flex items-center gap-2 pr-4 focus-within:border-green-400 transition-all">
                                    <input 
                                        type="file" 
                                        ref={fileInputRef} 
                                        onChange={handleUpload} 
                                        className="hidden" 
                                        accept=".pdf"
                                    />
                                    <button 
                                        onClick={() => fileInputRef.current.click()}
                                        className="w-10 h-10 rounded-full bg-gray-100 text-gray-500 hover:bg-green-100 hover:text-green-600 flex items-center justify-center transition-all"
                                    >
                                        <i data-lucide="plus" className="w-5 h-5"></i>
                                    </button>
                                    
                                    <textarea 
                                        value={input}
                                        onChange={(e) => setInput(e.target.value)}
                                        onKeyPress={(e) => e.key === 'Enter' && !e.shiftKey && (e.preventDefault(), handleSend())}
                                        placeholder="Ask anything about your documents..."
                                        className="flex-1 bg-transparent border-none focus:ring-0 text-sm py-2 px-2 resize-none max-h-32 placeholder-gray-400"
                                        rows="1"
                                    ></textarea>

                                    <div className="flex gap-2">
                                        <button className="w-10 h-10 rounded-full text-gray-400 hover:bg-gray-100 transition-all flex items-center justify-center">
                                            <i data-lucide="mic" className="w-5 h-5"></i>
                                        </button>
                                        <button 
                                            onClick={handleSend}
                                            disabled={!input.trim()}
                                            className="w-10 h-10 rounded-full bg-[#22c55e] text-white disabled:bg-gray-200 disabled:text-gray-400 hover:bg-[#16a34a] transition-all flex items-center justify-center shadow-lg"
                                        >
                                            <i data-lucide="arrow-up" className="w-6 h-6"></i>
                                        </button>
                                    </div>
                                </div>
                                <div className="text-center mt-3 text-[10px] text-gray-400">
                                    Intelligent Research Assistant can make mistakes. Verify important information.
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
