<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intelligent Research Assistant</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- React & Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f0fdf4; }
        .sidebar-gradient { background: linear-gradient(180deg, #0b0f0c 0%, #022c22 100%); }
        .chat-container::-webkit-scrollbar { width: 6px; }
        .chat-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .transition-all { transition: all 0.2s ease-in-out; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(8px); }
        @keyframes pulse-green {
            0%, 100% { border-color: #22c55e; box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            50% { border-color: #4ade80; box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.1); }
        }
        .focus-ring:focus { outline: none; animation: pulse-green 2s infinite; }
    </style>
</head>
<body class="h-screen overflow-hidden">
    <div id="root" class="h-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Modal = ({ isOpen, onClose, title, children }) => {
            useEffect(() => { if (isOpen) setTimeout(() => lucide.createIcons(), 50); }, [isOpen]);
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm transition-opacity">
                    <div className="bg-[#1e1e1e] rounded-2xl w-full max-w-md overflow-hidden shadow-[0_0_50px_rgba(0,0,0,0.5)] border border-gray-800">
                        <div className="flex justify-between items-center p-4 border-b border-gray-800">
                            <h3 className="text-white font-medium">{title}</h3>
                            <button onClick={onClose} className="text-gray-400 hover:text-white transition-colors">
                                <i data-lucide="x" className="w-5 h-5"></i>
                            </button>
                        </div>
                        <div className="p-6">{children}</div>
                    </div>
                </div>
            );
        };

        const ShareModal = ({ isOpen, onClose }) => (
            <Modal isOpen={isOpen} onClose={onClose} title="Share link to chat">
                <div className="space-y-6">
                    <div className="bg-[#2d2d2d] rounded-xl p-4 flex flex-col items-center justify-center gap-2 relative overflow-hidden h-36 border border-gray-700">
                       <div className="absolute inset-0 opacity-10 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]"></div>
                       <div className="w-12 h-12 bg-[#14532d] rounded-xl flex items-center justify-center shadow-lg relative z-10">
                           <i data-lucide="book-open" className="w-6 h-6 text-[#4ade80]"></i>
                       </div>
                       <h4 className="text-white font-medium text-sm relative z-10 mt-1">DocuMind AI Session</h4>
                    </div>
                    
                    <div className="flex justify-around pt-2">
                        <div className="flex flex-col items-center gap-2">
                            <button onClick={() => { navigator.clipboard.writeText(window.location.href); alert("Link Copied!"); onClose(); }} className="w-12 h-12 bg-white text-black rounded-full flex items-center justify-center hover:bg-gray-200 transition-colors">
                                <i data-lucide="link" className="w-5 h-5"></i>
                            </button>
                            <span className="text-xs text-gray-400 font-medium">Copy link</span>
                        </div>
                        <div className="flex flex-col items-center gap-2">
                            <button onClick={onClose} className="w-12 h-12 bg-white text-black rounded-full flex items-center justify-center font-bold text-lg hover:bg-gray-200 transition-colors">𝕏</button>
                            <span className="text-xs text-gray-400 font-medium">X</span>
                        </div>
                        <div className="flex flex-col items-center gap-2">
                            <button onClick={onClose} className="w-12 h-12 bg-white text-black rounded-full flex items-center justify-center font-bold text-lg hover:bg-gray-200 transition-colors">in</button>
                            <span className="text-xs text-gray-400 font-medium">LinkedIn</span>
                        </div>
                        <div className="flex flex-col items-center gap-2">
                            <button onClick={onClose} className="w-12 h-12 bg-white text-black rounded-full flex items-center justify-center hover:bg-gray-200 transition-colors">
                                <svg className="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M24 11.5c0-1.65-1.35-3-3-3-.96 0-1.86.48-2.42 1.24-1.64-1-3.75-1.64-6.07-1.72.08-1.1.4-3.05 1.52-3.7.72-.4 1.73-.24 3 .5C17.2 6.3 18.46 7.5 20 7.5c1.65 0 3-1.35 3-3s-1.35-3-3-3c-1.38 0-2.54.94-2.88 2.22-1.43-.72-2.64-.8-3.6-.25-1.64.94-1.95 3.47-2 4.55-2.33.08-4.45.7-6.1 1.72C4.86 8.98 3.96 8.5 3 8.5c-1.65 0-3 1.35-3 3 0 1.32.84 2.44 2.05 2.84-.03.22-.05.44-.05.66 0 3.86 4.5 7 10 7s10-3.14 10-7c0-.22-.02-.44-.05-.66 1.2-.4 2.05-1.54 2.05-2.84zM2.3 11.5c0-1.1.9-2 2-2 .64 0 1.22.32 1.6.82-1.1.85-1.92 1.9-2.3 3.1-.8-.35-1.3-1.15-1.3-1.92zm15 3.8c.84 0 1.5.66 1.5 1.5s-.66 1.5-1.5 1.5-1.5-.66-1.5-1.5.66-1.5 1.5-1.5zm-5.5 3.2c-2.3 0-4.22-.9-4.22-2h1.5c0 .54 1.22 1 2.7 1s2.7-.46 2.7-1h1.5c0 1.1-1.9 2-4.2 2zm-4.5-3.2c.84 0 1.5.66 1.5 1.5s-.66 1.5-1.5 1.5-1.5-.66-1.5-1.5.66-1.5 1.5-1.5zm10.4-3.1c-.38-1.2-1.2-2.26-2.3-3.1.38-.5.96-.82 1.6-.82 1.1 0 2 .9 2 2 0 .77-.5 1.57-1.3 1.92z"/></svg>
                            </button>
                            <span className="text-xs text-gray-400 font-medium">Reddit</span>
                        </div>
                    </div>
                </div>
            </Modal>
        );

        const SettingsModal = ({ isOpen, onClose }) => {
            const [model, setModel] = useState("llama-3.1-8b-instant");
            const [temperature, setTemperature] = useState("0.3");

            return (
                <Modal isOpen={isOpen} onClose={onClose} title="Settings">
                    <div className="space-y-6 text-gray-300">
                        <div className="space-y-2">
                            <label className="text-sm font-medium">Inference Model</label>
                            <select 
                                value={model} 
                                onChange={(e) => setModel(e.target.value)}
                                className="w-full bg-[#2d2d2d] border border-gray-700 rounded-lg p-2.5 text-white outline-none focus:border-green-500 transition-colors"
                            >
                                <option value="llama-3.1-8b-instant">Llama 3.1 8B Instant (Fast)</option>
                                <option value="llama-3.3-70b-versatile">Llama 3.3 70B Versatile (Accurate)</option>
                                <option value="mixtral-8x7b-32768">Mixtral 8x7B (Balanced)</option>
                            </select>
                        </div>
                        
                        <div className="space-y-2">
                            <label className="text-sm font-medium flex justify-between">
                                <span>Temperature</span>
                                <span>{temperature}</span>
                            </label>
                            <input 
                                type="range" 
                                min="0" max="1" step="0.1" 
                                value={temperature} 
                                onChange={(e) => setTemperature(e.target.value)}
                                className="w-full accent-green-500 h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer"
                            />
                            <p className="text-xs text-gray-500 pt-1">Lower for exact citations, higher for creative synthesis.</p>
                        </div>

                        <div className="flex items-center justify-between pt-6 border-t border-gray-800">
                            <div>
                                <h4 className="text-sm font-medium text-white">Clear local memory</h4>
                                <p className="text-[10px] text-gray-500 mt-1">Remove all uploaded documents and history.</p>
                            </div>
                            <button onClick={() => { alert("Local chunks cleared!"); onClose(); }} className="px-4 py-2 bg-red-500/10 text-red-500 border border-red-500/20 rounded-lg text-sm font-medium hover:bg-red-500/20 transition-colors flex items-center gap-2">
                                <i data-lucide="trash-2" className="w-4 h-4"></i> Clear All
                            </button>
                        </div>
                    </div>
                </Modal>
            );
        };

        const SidebarItem = ({ icon: Icon, label, active = false, onClick }) => (
            <button onClick={onClick} className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all ${active ? 'bg-[#14532d] text-white shadow-lg' : 'text-gray-400 hover:bg-[#022c22] hover:text-white'}`}>
                <i data-lucide={Icon} className="w-4 h-4"></i>
                <span className="text-sm font-medium">{label}</span>
            </button>
        );

        const App = () => {
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [pipelineStatus, setPipelineStatus] = useState(null);
            const [isUploading, setIsUploading] = useState(false);
            const [recentFiles, setRecentFiles] = useState([]);
            const [isListening, setIsListening] = useState(false);
            const [isShareOpen, setIsShareOpen] = useState(false);
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);
            const chatEndRef = useRef(null);
            const fileInputRef = useRef(null);

            const initialMessage = {
                role: 'assistant',
                content: "Hello! I'm your Intelligent Research Assistant. Upload a PDF and ask me anything about it."
            };

            useEffect(() => {
                lucide.createIcons();
                setMessages([initialMessage]);
            }, []);

            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
                lucide.createIcons();
            }, [messages, recentFiles]);

            const handleNewChat = () => {
                setMessages([initialMessage]);
            };

            const handleUpload = async (e) => {
                const files = e.target.files;
                if (!files.length) return;
                
                const file = files[0];
                setIsUploading(true);
                setPipelineStatus("Initializing Upload...");

                const formData = new FormData();
                formData.append('file', file);

                try {
                    const response = await fetch('/upload', { method: 'POST', body: formData });
                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    let buffer = '';

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        buffer += decoder.decode(value, { stream: true });
                        const lines = buffer.split('\n');
                        buffer = lines.pop(); // keep incomplete line
                        
                        for (const line of lines) {
                            if (line.trim()) {
                                try {
                                    const data = JSON.parse(line);
                                    if (data.status) setPipelineStatus(data.status);
                                    if (data.error) alert(data.error);
                                } catch (e) {
                                    console.error("JSON parse error on stream", e);
                                }
                            }
                        }
                    }
                    if (buffer.trim()) {
                        try {
                            const data = JSON.parse(buffer);
                            if (data.status) setPipelineStatus(data.status);
                        } catch(e) {}
                    }
                    setTimeout(() => setPipelineStatus(null), 3000);
                    // Add successful upload to recents
                    setRecentFiles(prev => [file.name, ...prev]);
                } catch (err) {
                    setPipelineStatus("Upload failed.");
                    console.error(err);
                } finally {
                    setIsUploading(false);
                    e.target.value = '';
                }
            };

            const handleSend = async () => {
                if (!input.trim()) return;

                const userMsg = input;
                setInput('');
                setMessages(prev => [...prev, { role: 'user', content: userMsg }]);
                setPipelineStatus("Processing query...");

                try {
                    const response = await fetch('/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: userMsg })
                    });

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    let buffer = '';

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        buffer += decoder.decode(value, { stream: true });
                        const lines = buffer.split('\n');
                        buffer = lines.pop();
                        
                        for (const line of lines) {
                            if (line.trim()) {
                                try {
                                    const data = JSON.parse(line);
                                    if (data.status) setPipelineStatus(data.status);
                                    if (data.answer) {
                                        setMessages(prev => [...prev, { role: 'assistant', content: data.answer, citations: data.citations }]);
                                    }
                                    if (data.error) {
                                        setMessages(prev => [...prev, { role: 'assistant', content: `Error: ${data.error}` }]);
                                    }
                                } catch (e) {
                                    console.error("JSON parse error on chat stream");
                                }
                            }
                        }
                    }
                    if (buffer.trim()) {
                        try {
                            const data = JSON.parse(buffer);
                            if (data.status) setPipelineStatus(data.status);
                            if (data.answer) {
                                setMessages(prev => [...prev, { role: 'assistant', content: data.answer, citations: data.citations }]);
                            }
                        } catch(e) {}
                    }
                    setPipelineStatus(null);
                } catch (err) {
                    setPipelineStatus("Error generating response.");
                    console.error(err);
                }
            };

            return (
                <div className="flex h-screen w-screen bg-[#f0fdf4]">
                    {/* Sidebar */}
                    <aside className="w-64 sidebar-gradient flex flex-col p-4 shadow-2xl">
                        <div className="flex items-center gap-2 mb-8 px-2 text-white">
                            <div className="w-8 h-8 bg-[#22c55e] rounded-lg flex items-center justify-center">
                                <i data-lucide="book-open" className="w-5 h-5 text-black"></i>
                            </div>
                            <span className="font-bold text-lg tracking-tight">DocuMind AI</span>
                        </div>

                        <nav className="flex-1 space-y-2 overflow-y-auto">
                            <SidebarItem icon="plus" label="New Chat" active onClick={handleNewChat} />
                            <SidebarItem icon="database" label="Knowledge Base" onClick={() => alert('Knowledge Base features coming soon!')} />
                            <SidebarItem icon="bookmark" label="Saved Citations" onClick={() => alert('Saved Citations coming soon!')} />
                            <SidebarItem icon="pie-chart" label="Analytics" onClick={() => alert('Analytics dashboard coming soon!')} />
                            <SidebarItem icon="download" label="Export Data" onClick={() => alert('Export functionality coming soon!')} />

                            <div className="pt-6 pb-2 text-[10px] font-bold text-gray-500 uppercase tracking-widest px-3">Recents</div>
                            <div className="space-y-1">
                                {recentFiles.length > 0 ? recentFiles.map((file, idx) => (
                                    <button key={idx} className="w-full text-left px-3 py-2 text-xs text-gray-400 hover:text-white truncate transition-all flex items-center gap-2">
                                        <i data-lucide="file-text" className="w-3 h-3"></i> {file}
                                    </button>
                                )) : (
                                    <div className="px-3 py-2 text-xs text-gray-600 italic">No recent uploads</div>
                                )}
                            </div>
                        </nav>

                        <div className="mt-auto pt-4 border-t border-gray-800">
                            <div className="flex items-center gap-3 px-2 py-3 hover:bg-[#022c22] rounded-xl transition-all cursor-pointer">
                                <div className="w-8 h-8 rounded-full bg-[#14532d] flex items-center justify-center text-xs font-bold text-green-400">AS</div>
                                <div className="flex flex-col">
                                    <span className="text-sm text-white font-medium">Adarsh Shukla</span>
                                    <span className="text-[10px] text-gray-500">Free Plan</span>
                                </div>
                            </div>
                        </div>
                    </aside>

                    {/* Main Chat Area */}
                    <main className="flex-1 flex flex-col relative">
                        {/* Header */}
                        <header className="h-16 flex items-center justify-between px-8 bg-white/50 backdrop-blur-md border-b border-green-100">
                            <h2 className="text-lg font-semibold text-gray-800">Intelligent Research Assistant</h2>
                            <div className="flex gap-4">
                                <button className="p-2 text-gray-500 hover:text-green-600 transition-all" onClick={() => setIsShareOpen(true)} title="Share Chat"><i data-lucide="share" className="w-5 h-5"></i></button>
                                <button className="p-2 text-gray-500 hover:text-green-600 transition-all" onClick={() => setIsSettingsOpen(true)} title="Settings"><i data-lucide="settings" className="w-5 h-5"></i></button>
                            </div>
                        </header>

                        {/* Messages */}
                        <div className="flex-1 overflow-y-auto chat-container p-8 space-y-6">
                            <div className="max-w-3xl mx-auto w-full space-y-8">
                                {messages.map((msg, i) => (
                                    <div key={i} className={`flex gap-4 ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                        {msg.role === 'assistant' && (
                                            <div className="w-8 h-8 rounded-lg bg-[#22c55e]/20 flex items-center justify-center flex-shrink-0">
                                                <i data-lucide="bot" className="w-5 h-5 text-[#22c55e]"></i>
                                            </div>
                                        )}
                                        <div className={`max-w-[85%] px-4 py-3 rounded-2xl ${
                                            msg.role === 'user' 
                                            ? 'bg-[#14532d] text-white shadow-md' 
                                            : 'bg-white border border-green-100 text-gray-800 shadow-sm'
                                        }`}>
                                            <div className="text-sm leading-relaxed whitespace-pre-wrap">{msg.content}</div>
                                            {msg.citations && msg.citations.length > 0 && (
                                                <div className="mt-4 pt-3 border-t border-green-50 flex flex-wrap gap-2">
                                                    {msg.citations.map((cite, idx) => (
                                                        <span key={idx} className="bg-green-50 text-[10px] px-2 py-1 rounded-md text-green-700 font-medium border border-green-200">
                                                            {cite.filename} (p. {cite.page_number})
                                                        </span>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                ))}
                                <div ref={chatEndRef} />
                            </div>
                        </div>

                        {/* Input Area */}
                        <div className="p-6 bg-transparent">
                            <div className="max-w-3xl mx-auto relative">
                                {/* Pipeline Status Bar */}
                                {pipelineStatus && (
                                    <div className="absolute -top-10 left-0 right-0 flex justify-center">
                                        <div className="bg-[#14532d] text-white px-4 py-1.5 rounded-full text-xs font-medium flex items-center gap-2 shadow-lg animate-bounce">
                                            <i data-lucide="refresh-cw" className="w-3 h-3 animate-spin"></i>
                                            {pipelineStatus}
                                        </div>
                                    </div>
                                )}

                                <div className="glass border-2 border-green-100 rounded-3xl p-2 shadow-2xl flex items-center gap-2 pr-4 focus-within:border-green-400 transition-all">
                                    <input 
                                        type="file" 
                                        ref={fileInputRef} 
                                        onChange={handleUpload} 
                                        className="hidden" 
                                        accept=".pdf"
                                    />
                                    <button 
                                        onClick={() => fileInputRef.current.click()}
                                        className="w-10 h-10 rounded-full bg-gray-100 text-gray-500 hover:bg-green-100 hover:text-green-600 flex items-center justify-center transition-all"
                                    >
                                        <i data-lucide="plus" className="w-5 h-5"></i>
                                    </button>
                                    
                                    <textarea 
                                        value={input}
                                        onChange={(e) => setInput(e.target.value)}
                                        onKeyPress={(e) => e.key === 'Enter' && !e.shiftKey && (e.preventDefault(), handleSend())}
                                        placeholder="Ask anything about your documents..."
                                        className="flex-1 bg-transparent border-none focus:ring-0 text-sm py-2 px-2 resize-none max-h-32 placeholder-gray-400"
                                        rows="1"
                                    ></textarea>

                                    <div className="flex gap-2">
                                        <button 
                                            onClick={() => setIsListening(!isListening)}
                                            title="Voice Input"
                                            className={`w-10 h-10 rounded-full transition-all flex items-center justify-center ${isListening ? 'bg-red-100 text-red-500 shadow-md' : 'text-gray-400 hover:bg-gray-100'}`}
                                        >
                                            <i data-lucide="mic" className="w-5 h-5"></i>
                                        </button>
                                        <button 
                                            onClick={handleSend}
                                            disabled={!input.trim()}
                                            className="w-10 h-10 rounded-full bg-[#22c55e] text-white disabled:bg-gray-200 disabled:text-gray-400 hover:bg-[#16a34a] transition-all flex items-center justify-center shadow-lg"
                                        >
                                            <i data-lucide="arrow-up" className="w-6 h-6"></i>
                                        </button>
                                    </div>
                                </div>
                                <div className="text-center mt-3 text-[10px] text-gray-400">
                                    Intelligent Research Assistant can make mistakes. Verify important information.
                                </div>
                            </div>
                        </div>
                    </main>
                    <ShareModal isOpen={isShareOpen} onClose={() => setIsShareOpen(false)} />
                    <SettingsModal isOpen={isSettingsOpen} onClose={() => setIsSettingsOpen(false)} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
